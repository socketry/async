name: Test

on: [push, pull_request]

permissions:
  contents: read

env:
  CONSOLE_OUTPUT: XTerm
  IO_EVENT_SELECTOR: Select

jobs:
  test:
    name: ${{matrix.name}} on ubuntu / IO_EVENT_SELECTOR=Select
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: stop then fork baseline
            command: |
              for i in $(seq 1 50); do
                echo "::group::stop then fork baseline iteration $i"
                timeout 30s bundle exec sus test/process/task_suite_then_fork.rb
                echo "::endgroup::"
              done
          - name: failed task then fork baseline
            command: |
              for i in $(seq 1 50); do
                echo "::group::failed task then fork baseline iteration $i"
                timeout 30s bundle exec sus test/process/fork_after_failed_task.rb
                echo "::endgroup::"
              done
          - name: failed task then fork diagnostics
            command: |
              for i in $(seq 1 50); do
                echo "::group::failed task then fork diagnostics iteration $i"
                FORK_DIAGNOSTICS=1 timeout 30s bundle exec sus test/process/fork_after_failed_task.rb
                echo "::endgroup::"
              done
          - name: fork diagnostics
            command: |
              for i in $(seq 1 20); do
                echo "::group::fork diagnostics iteration $i"
                FORK_DIAGNOSTICS=1 timeout 30s bundle exec sus test/process/fork.rb
                echo "::endgroup::"
              done
          - name: stop then fork diagnostics
            command: |
              for i in $(seq 1 20); do
                echo "::group::stop then fork diagnostics iteration $i"
                FORK_DIAGNOSTICS=1 timeout 30s bundle exec sus test/process/task_suite_then_fork.rb
                echo "::endgroup::"
              done
          - name: stop then fork diagnostics gc
            command: |
              for i in $(seq 1 20); do
                echo "::group::stop then fork diagnostics gc iteration $i"
                FORK_DIAGNOSTICS=1 GC_BEFORE_FORK=1 timeout 30s bundle exec sus test/process/task_suite_then_fork.rb
                echo "::endgroup::"
              done
    
    steps:
    - uses: actions/checkout@v3
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: head
        bundler-cache: true
    
    - name: Run selected tests
      timeout-minutes: 5
      run: ${{matrix.command}}
    
    # Maybe buggy.
    # - name: Run external tests
    #   timeout-minutes: 10
    #   run: bundle exec bake test:external
