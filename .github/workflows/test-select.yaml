name: Test

on: [push, pull_request]

permissions:
  contents: read

env:
  CONSOLE_OUTPUT: XTerm
  IO_EVENT_SELECTOR: Select

jobs:
  test:
    name: ${{matrix.name}} on ubuntu / IO_EVENT_SELECTOR=Select
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: combined copy 1
            command: bundle exec sus test/process/task_suite_then_fork.rb
          - name: combined copy 2
            command: bundle exec sus test/process/task_suite_then_fork.rb
          - name: combined copy 3
            command: bundle exec sus test/process/task_suite_then_fork.rb
          - name: task then fork control 1
            command: bundle exec sus test/async/task.rb test/process/fork.rb
          - name: task then fork control 2
            command: bundle exec sus test/async/task.rb test/process/fork.rb
    
    steps:
    - uses: actions/checkout@v3
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: head
        bundler-cache: true
    
    - name: Run selected tests
      timeout-minutes: 5
      run: ${{matrix.command}}
    
    # Maybe buggy.
    # - name: Run external tests
    #   timeout-minutes: 10
    #   run: bundle exec bake test:external
